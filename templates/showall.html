<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f7f7f7;
            margin: 0;
            padding: 20px;
        }

```
    h1 {
        color: #333;
    }

    table {
        width: 90%;
        margin: 20px auto;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    th, td {
        border: 1px solid #ddd;
        padding: 12px;
    }

    th {
        background: navy;
        color: white;
    }

    tr:nth-child(even) {
        background: #f2f2f2;
    }

    tr:hover {
        background: #e6f2ff;
    }

    a {
        text-decoration: none;
        color: blue;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }

    .no-data {
        padding: 20px;
        color: #777;
    }
</style>
```

</head>
<body>

<h1>All Stored Users</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Address</th>
        <th>Phone</th>
    </tr>

```
{% if users %}
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.address }}</td>
        <td>{{ user.phonenumber }}</td>
    </tr>
    {% endfor %}
{% else %}
    <tr>
        <td colspan="5" class="no-data">No users found</td>
    </tr>
{% endif %}
```

</table>

<br>
<a href="/">← Back Home</a>

</body>
</html>
